<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dops Cat Animation</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const img = new Image();
img.src = 'logo-2048.png';

// Sparkle particles
class Sparkle {
  constructor() { this.reset(); }
  reset() {
    this.x = (Math.random() - 0.5) * 320;
    this.y = (Math.random() - 0.5) * 320;
    this.size = Math.random() * 3 + 1;
    this.life = 0;
    this.maxLife = Math.random() * 120 + 60;
    this.speed = Math.random() * 0.3 + 0.1;
    this.angle = Math.random() * Math.PI * 2;
    this.hue = Math.random() * 60 + 240; // purple-blue range
  }
  update() {
    this.life++;
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed - 0.2;
    if (this.life >= this.maxLife) this.reset();
  }
  draw(cx, cy) {
    const alpha = 1 - this.life / this.maxLife;
    const pulse = 0.5 + 0.5 * Math.sin(this.life * 0.15);
    const s = this.size * (0.8 + pulse * 0.4);
    ctx.save();
    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = `hsl(${this.hue}, 80%, 75%)`;
    ctx.shadowColor = `hsl(${this.hue}, 90%, 70%)`;
    ctx.shadowBlur = 8;
    // Draw a 4-point star
    const x = cx + this.x, y = cy + this.y;
    ctx.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 - Math.PI / 2;
      const aNext = ((i + 0.5) / 4) * Math.PI * 2 - Math.PI / 2;
      ctx.lineTo(x + Math.cos(a) * s * 2.5, y + Math.sin(a) * s * 2.5);
      ctx.lineTo(x + Math.cos(aNext) * s * 0.6, y + Math.sin(aNext) * s * 0.6);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

const sparkles = Array.from({ length: 30 }, () => new Sparkle());

// Tail wag parameters
let tailPhase = 0;

let t = 0;

function draw() {
  requestAnimationFrame(draw);
  ctx.clearRect(0, 0, W, H);
  t++;

  tailPhase += 0.04;

  // Floating bob
  const bobY = Math.sin(t * 0.025) * 12;
  // Gentle sway
  const swayX = Math.sin(t * 0.015) * 4;
  // Slight tilt
  const tilt = Math.sin(t * 0.02) * 0.03;
  // Breathing scale
  const breathe = 1 + Math.sin(t * 0.03) * 0.015;

  const size = Math.min(W, H) * 0.55;
  const cx = W / 2 + swayX;
  const cy = H / 2 + bobY;

  // Draw glow behind cat
  const glowPulse = 0.3 + 0.15 * Math.sin(t * 0.04);
  const gradient = ctx.createRadialGradient(cx, cy, size * 0.1, cx, cy, size * 0.7);
  gradient.addColorStop(0, `rgba(147, 100, 255, ${glowPulse})`);
  gradient.addColorStop(0.5, `rgba(100, 60, 220, ${glowPulse * 0.4})`);
  gradient.addColorStop(1, 'rgba(100, 60, 220, 0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  // Draw sparkles behind
  sparkles.slice(0, 15).forEach(s => { s.update(); s.draw(cx, cy); });

  // Draw the cat image
  if (img.complete && img.naturalWidth > 0) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(tilt);
    ctx.scale(breathe, breathe);

    const drawSize = size;
    ctx.drawImage(img, -drawSize / 2, -drawSize / 2, drawSize, drawSize);

    // Collar gem glow pulse
    const gemGlow = 0.4 + 0.4 * Math.sin(t * 0.06);
    ctx.save();
    ctx.globalAlpha = gemGlow;
    ctx.fillStyle = '#7df9ff';
    ctx.shadowColor = '#7df9ff';
    ctx.shadowBlur = 20 + 10 * Math.sin(t * 0.06);
    ctx.beginPath();
    ctx.arc(drawSize * 0.0, drawSize * 0.13, drawSize * 0.018, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.restore();
  }

  // Draw sparkles in front
  sparkles.slice(15).forEach(s => { s.update(); s.draw(cx, cy); });

  // Subtle vignette
  const vignette = ctx.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.75);
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);
}

img.onload = draw;
</script>
</body>
</html>
