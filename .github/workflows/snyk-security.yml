name: Snyk Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # SAST — results uploaded to GitHub Code Scanning.
      # || true so the pipeline continues to the upload step even when issues are found.
      - name: Snyk Code test
        run: snyk code test --sarif-file-output=snyk-code.sarif || true

      # SCA — monitor open source dependencies.
      - name: Snyk Open Source monitor
        run: snyk monitor --all-projects
        continue-on-error: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
