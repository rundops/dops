version: 2

builds:
  - binary: dops
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X dops/cmd.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

sboms:
  - artifacts: archive
    cmd: syft
    args:
      - "${artifact}"
      - "--output"
      - "spdx-json=${document}"

brews:
  - name: dops
    repository:
      owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
    description: Developer Operations TUI — browse, parameterize, and execute runbooks from the terminal
    license: MIT
    install: |
      bin.install "dops"
    test: |
      system "#{bin}/dops", "version"

scoops:
  - name: dops
    repository:
      owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
      name: scoop-bucket
      token: "{{ .Env.GITHUB_TOKEN }}"
    homepage: "https://github.com/{{ .Env.GITHUB_REPOSITORY }}"
    description: Developer Operations TUI — browse, parameterize, and execute runbooks from the terminal
    license: MIT
